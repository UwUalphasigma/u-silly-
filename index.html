<!DOCTYPE html>
<html>
  <head>

    <!-- OpenGraph Title/Description (helps Discord render embed properly) -->
    <meta property="og:title" content="Video">
    <meta property="og:description" content="Watch this">

    <!-- Thumbnail (IMPORTANT: avoid raw.githubusercontent if possible) -->
    <meta property="og:image" content="https://uwualphasigma.github.io/u-silly-/media/shinobi-sekiro.gif">

    <meta property="og:type" content="video.other">

    <!-- Video Link (kept as you wanted) -->
    <meta property="og:video" content="https://raw.githubusercontent.com/UwUalphasigma/u-silly-/main/media/chirp.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="250">
    <meta property="og:video:height" content="202">

    <!-- Prevent instant redirect so Discord can actually fetch OG data -->
    <meta http-equiv="refresh" content="3; url=https://youtu.be/AuKR2fQbMBk?si=omdzycruQlccYbFY" />

  </head>

  <body>
  </body>
</html>
